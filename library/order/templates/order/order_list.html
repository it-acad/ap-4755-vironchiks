<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; background-color: #1e1e1e; color: #e0e0e0; margin: 40px; }
        table { width: 100%; border-collapse: collapse; background: #2d2d2d; border-radius: 8px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #444; }
        th { background-color: #333; color: white; }
        tr:hover { background-color: #3d3d3d; }
    </style>
</head>
<body>
    <h1>Усі замовлення</h1>
    <table>
        <tr><th>ID</th><th>Користувач</th><th>Книга</th><th>Дата</th></tr>
        {% for order in orders %}
        <tr>
            <td>{{ order.id }}</td>
            <td>{{ order.user.id }}</td>
            <td>{{ order.book.id }}</td>
            <td>{{ order.created_at|date:"d.m.Y" }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
